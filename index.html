<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTweakerAI - Web Interface Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .sidebar-header {
            padding: 16px;
            background: #0f0f1a;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h1 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #4ecdc4;
        }

        .url-input-container {
            display: flex;
            gap: 8px;
        }

        .url-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 13px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4ecdc4;
            color: #1a1a2e;
        }

        .btn-primary:hover {
            background: #45b8a8;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .element-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .element-item {
            padding: 8px 12px;
            background: #16213e;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .element-item:hover {
            border-color: #333;
        }

        .element-item.selected {
            border-color: #4ecdc4;
            background: #1f3a5e;
        }

        .element-item.selected::before {
            content: "●";
            position: absolute;
            left: -16px;
            color: #4ecdc4;
            font-size: 12px;
        }

        .element-name {
            font-size: 13px;
            font-weight: 500;
            color: #eee;
            margin-bottom: 4px;
        }

        .element-info {
            font-size: 11px;
            color: #888;
            display: flex;
            gap: 12px;
        }

        .element-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        .preview-header {
            height: 56px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
        }

        .browser-bar {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 16px;
            flex: 1;
            display: flex;
            gap: 8px;
        }

        .browser-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: #fff;
        }

        .properties-panel {
            padding: 16px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        .properties-panel h2 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .property-group {
            margin-bottom: 16px;
        }

        .property-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .property-group input[type="text"],
        .property-group textarea,
        .property-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .property-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .properties-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .btn-control {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: #f8f8f8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-control:hover {
            background: #eee;
        }

                        .btn-control:active {
                            background: #ddd;
                        }

                        .selected-box {
                            position: absolute;
                            border: 2px solid #4ecdc4;
                            box-sizing: border-box;
                            pointer-events: none;
                            background: rgba(78, 205, 196, 0.1);
                            z-index: 9999;
                        }

                        .output-section {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 16px;
        }

        .output-section label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .output-panel {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
        }

        .output-panel pre {
            font-size: 12px;
            color: #eee;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .note-type-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state p {
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>WebTweakerAI</h1>
            <div class="url-input-container">
                <input type="text" class="url-input" id="urlInput" placeholder="Enter URL to load...">
                <button class="btn btn-primary" id="loadBtn">Load</button>
            </div>
        </div>
        <div class="sidebar-content">
            <div class="section-title">Page Elements</div>
            <div class="element-list" id="elementList">
                <div class="empty-state">
                    <p>Load a webpage to see elements</p>
                </div>
            </div>
            
            <div class="section-title" style="margin-top: 24px;">Selected Element Properties</div>
            <div class="properties-panel" id="propertiesPanel" style="display: none;">
                <h2 id="selectedElementName">Element</h2>
                
                <div class="controls">
                    <button class="btn-control" id="moveLeftBtn">← Left</button>
                    <button class="btn-control" id="moveRightBtn">Right →</button>
                    <button class="btn-control" id="moveUpBtn">↑ Up</button>
                    <button class="btn-control" id="moveDownBtn">Down ↓</button>
                    <button class="btn-control" id="scaleUpBtn">↑ Scale</button>
                    <button class="btn-control" id="scaleDownBtn">↓ Scale</button>
                </div>
                
                <div class="properties-grid">
                    <div class="property-group">
                        <label>Type</label>
                        <input type="text" id="elementType" readonly>
                    </div>
                    <div class="property-group">
                        <label>Class</label>
                        <input type="text" id="elementClass" readonly>
                    </div>
                    <div class="property-group">
                        <label>Current Position (X, Y)</label>
                        <input type="text" id="elementPosition" readonly>
                    </div>
                    <div class="property-group">
                        <label>Dimensions (W x H)</label>
                        <input type="text" id="elementSize" readonly>
                    </div>
                </div>
                
                <div class="property-group">
                    <label>Design Notes / AI Instructions</label>
                    <textarea id="elementNotes" placeholder="Describe how this element should change or what notes you have for AI processing..."></textarea>
                </div>
                
                <div class="property-group">
                    <label>Type of Change</label>
                    <select class="note-type-select" id="noteType">
                        <option value="position">Position/Placement</option>
                        <option value="size">Size/Scale</option>
                        <option value="styling">Styling/Visual</option>
                        <option value="content">Content/Text</option>
                        <option value="layout">Layout/Grid</option>
                        <option value="spacing">Spacing/Margins</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" id="generateBtn" style="flex: 1;">Generate Change Summary</button>
                </div>
            </div>
            
            <div class="output-section">
                <label>AI Change Summary (Bullet List)</label>
                <div class="output-panel">
                    <pre id="outputText">Loading change summary...</pre>
                </div>
            </div>
        </div>
    </div>
    
    <div class="preview-area">
        <div class="preview-header">
            <div class="browser-bar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <input type="text" id="browserAddress" placeholder="https://example.com">
            </div>
        </div>
        <iframe id="previewFrame" src="about:blank"></iframe>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const previewFrame = document.getElementById('previewFrame');
        const browserAddress = document.getElementById('browserAddress');
        const elementList = document.getElementById('elementList');
        const propertiesPanel = document.getElementById('propertiesPanel');
        const selectedElementName = document.getElementById('selectedElementName');
        const elementType = document.getElementById('elementType');
        const elementClass = document.getElementById('elementClass');
        const elementPosition = document.getElementById('elementPosition');
        const elementSize = document.getElementById('elementSize');
        const elementNotes = document.getElementById('elementNotes');
        const noteType = document.getElementById('noteType');
        const generateBtn = document.getElementById('generateBtn');
        const outputText = document.getElementById('outputText');
        
        let selectedElement = null;
        let elementsData = [];
        let currentScale = 1;
        let currentX = 0;
        let currentY = 0;
        let selectedBox = null;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        function loadSamplePage() {
            browserAddress.value = 'about:blank';
            previewFrame.src = 'about:blank';
            
            const sampleHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; background: #fff; }
                        .nav { display: flex; gap: 20px; background: #333; padding: 10px; margin-bottom: 20px; }
                        .nav a { color: white; text-decoration: none; }
                        .hero { background: #4ecdc4; padding: 40px; border-radius: 8px; margin-bottom: 20px; }
                        .btn { background: #ff6b6b; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
                        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
                    </style>
                </head>
                <body>
                    <nav class="nav">
                        <a href="#">Home</a>
                        <a href="#">About</a>
                        <a href="#">Contact</a>
                    </nav>
                    <div class="hero">
                        <h1>Welcome to WebTweakerAI</h1>
                        <p>This is a demo page to test the interface</p>
                        <button class="btn">Get Started</button>
                    </div>
                    <div class="card">
                        <h2>Features</h2>
                        <p>Create amazing web interfaces with AI assistance.</p>
                    </div>
                    <div class="card">
                        <h2>Easy to Use</h2>
                        <p>Select elements, modify properties, and get AI-readable change summaries.</p>
                    </div>
                </body>
                </html>
             `;
             
             previewFrame.contentDocument.write(sampleHTML);
             previewFrame.contentDocument.close();
             
             setTimeout(() => {
                 injectIframeStyles(previewFrame.contentDocument);
                 extractElements();
             }, 100);
         }

        function showSelectionRect(index) {
            if (selectedBox) {
                selectedBox.remove();
                selectedBox = null;
            }
            
            if (index === null || !elementsData[index]) return;
            
            const elementData = elementsData[index];
            const iframeDoc = previewFrame.contentDocument;
            
            selectedBox = iframeDoc.createElement('div');
            selectedBox.className = 'selected-box';
            selectedBox.style.left = elementData.position.x + 'px';
            selectedBox.style.top = elementData.position.y + 'px';
            selectedBox.style.width = elementData.position.width + 'px';
            selectedBox.style.height = elementData.position.height + 'px';
            iframeDoc.body.appendChild(selectedBox);
            
            elementData.element.classList.add('selected');
        }

        function traverseAndBuildTree(root, depth = 0) {
            if (!root || root.nodeType !== Node.ELEMENT_NODE) return [];
            
            const elements = [];
            
            if (root.tagName.toLowerCase() !== 'script') {
                elements.push({ element: root, depth: depth });
            }
            
            for (const child of root.children) {
                elements.push(...traverseAndBuildTree(child, depth + 1));
            }
            
            return elements;
        }

        function extractElements() {
            elementsData = [];
            const iframeDoc = previewFrame.contentDocument;
            const body = iframeDoc.body;
            
            const allElements = traverseAndBuildTree(body);
            
            elementList.innerHTML = '';
            
            allElements.forEach((item, index) => {
                const el = item.element;
                const rect = el.getBoundingClientRect();
                
                const elementRect = {
                    left: rect.left,
                    top: rect.top,
                    width: rect.width,
                    height: rect.height,
                    x: rect.left,
                    y: rect.top
                };
                
                const elementInfo = {
                    id: index,
                    element: el,
                    tag: el.tagName.toLowerCase(),
                    className: el.className || 'no-class',
                    text: el.textContent?.trim().substring(0, 30) || '',
                    position: elementRect,
                    originalPosition: { ...elementRect },
                    depth: item.depth
                };
                
                elementsData.push(elementInfo);
                
                const itemEl = document.createElement('div');
                itemEl.className = 'element-item';
                itemEl.style.paddingLeft = (12 + (item.depth * 16)) + 'px';
                itemEl.innerHTML = `
                    <div class="element-name">${elementInfo.tag} ${elementInfo.className ? '.' + elementInfo.className.split(' ')[0] : ''}</div>
                    <div class="element-info">
                        <span>${elementInfo.text || 'No text'}</span>
                        <span>${Math.round(elementRect.width)}×${Math.round(elementRect.height)}</span>
                    </div>
                `;
                itemEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectElement(index);
                });
                elementList.appendChild(itemEl);
            });
            
            if (elementsData.length === 0) {
                elementList.innerHTML = '<div class="empty-state"><p>No elements found</p></div>';
            }
        }

        function injectIframeStyles(iframeDoc) {
            const style = iframeDoc.createElement('style');
            style.textContent = `
                .selected-box {
                    position: absolute;
                    border: 3px solid #4ecdc4;
                    box-sizing: border-box;
                    pointer-events: none;
                    background: rgba(78, 205, 196, 0.2);
                    z-index: 9999;
                }
                .selected {
                    outline: 3px solid #4ecdc4 !important;
                    outline-offset: 2px !important;
                    z-index: 9998 !important;
                }
            `;
            iframeDoc.head.appendChild(style);
        }

        function selectElement(index) {
            if (selectedElement !== null && elementsData[selectedElement]) {
                const prevItem = elementList.children[selectedElement];
                if (prevItem) prevItem.classList.remove('selected');
                
                const prevData = elementsData[selectedElement];
                if (prevData && prevData.element) {
                    prevData.element.classList.remove('selected');
                    prevData.element.classList.remove('selected-box-target');
                }
            }
            
            selectedElement = index;
            const elementData = elementsData[index];
            
            if (elementData) {
                showSelectionRect(index);
                
                const item = elementList.children[index];
                if (item) item.classList.add('selected');
                
                selectedElementName.textContent = `${elementData.tag} ${elementData.className ? '.' + elementData.className.split(' ')[0] : ''}`;
                elementType.value = elementData.tag;
                elementClass.value = elementData.className;
                elementPosition.value = `${Math.round(elementData.position.x)}, ${Math.round(elementData.position.y)}`;
                elementSize.value = `${Math.round(elementData.position.width)} × ${Math.round(elementData.position.height)}`;
                elementNotes.value = '';
                noteType.value = 'position';
                
                propertiesPanel.style.display = 'block';
                
                currentX = elementData.position.x;
                currentY = elementData.position.y;
                currentScale = 1;
                
                elementData.element.classList.add('selected-box-target');
                elementData.element.addEventListener('mousedown', handleDragStart);
            }
        }

        function handleDragStart(e) {
            if (selectedElement === null) return;
            
            e.preventDefault();
            e.stopPropagation();
            
            const elementData = elementsData[selectedElement];
            const iframeRect = previewFrame.getBoundingClientRect();
            const iframeDoc = previewFrame.contentDocument;
            
            const iframeX = e.clientX - iframeRect.left;
            const iframeY = e.clientY - iframeRect.top;
            
            dragOffsetX = iframeX - currentX;
            dragOffsetY = iframeY - currentY;
            
            isDragging = true;
            
            elementData.element.style.position = 'relative';
            
            const moveHandler = (moveEvent) => {
                if (!isDragging) return;
                
                const moveIframeX = moveEvent.clientX - iframeRect.left;
                const moveIframeY = moveEvent.clientY - iframeRect.top;
                
                currentX = moveIframeX - dragOffsetX;
                currentY = moveIframeY - dragOffsetY;
                
                elementData.position.x = currentX;
                elementData.position.y = currentY;
                
                elementData.element.style.left = currentX + 'px';
                elementData.element.style.top = currentY + 'px';
                
                if (selectedBox) {
                    selectedBox.style.left = (currentX - iframeRect.left) + 'px';
                    selectedBox.style.top = (currentY - iframeRect.top) + 'px';
                }
                
                elementPosition.value = `${Math.round(currentX)}, ${Math.round(currentY)}`;
            };
            
            const upHandler = () => {
                isDragging = false;
                iframeDoc.removeEventListener('mousemove', moveHandler);
                iframeDoc.removeEventListener('mouseup', upHandler);
            };
            
            iframeDoc.addEventListener('mousemove', moveHandler);
            iframeDoc.addEventListener('mouseup', upHandler);
        }

        function removeDragListeners() {
            if (selectedElement !== null && elementsData[selectedElement]) {
                const elementData = elementsData[selectedElement];
                elementData.element.removeEventListener('mousedown', handleDragStart);
            }
        }

        function moveElement(direction, delta = 10) {
            if (selectedElement === null || !elementsData[selectedElement]) return;
            
            const elementData = elementsData[selectedElement];
            
            switch(direction) {
                case 'left':
                    currentX -= delta;
                    break;
                case 'right':
                    currentX += delta;
                    break;
                case 'up':
                    currentY -= delta;
                    break;
                case 'down':
                    currentY += delta;
                    break;
            }
            
            elementData.position.x = currentX;
            elementData.position.y = currentY;
            
            elementData.element.style.position = 'relative';
            elementData.element.style.left = `${currentX}px`;
            elementData.element.style.top = `${currentY}px`;
            
            elementPosition.value = `${Math.round(currentX)}, ${Math.round(currentY)}`;
            
            if (!elementData.changes) elementData.changes = [];
            elementData.changes.push(`moved ${direction} ${delta}px`);
        }

        function scaleElement(scaleUp = true, factor = 0.1) {
            if (selectedElement === null || !elementsData[selectedElement]) return;
            
            const elementData = elementsData[selectedElement];
            
            if (scaleUp) {
                currentScale += factor;
            } else {
                currentScale = Math.max(0.1, currentScale - factor);
            }
            
            elementData.element.style.transform = `scale(${currentScale})`;
            elementData.element.style.transformOrigin = 'top left';
            elementData.position.width = elementData.originalPosition.width * currentScale;
            elementData.position.height = elementData.originalPosition.height * currentScale;
            
            elementSize.value = `${Math.round(elementData.position.width)} × ${Math.round(elementData.position.height)}`;
            
            if (!elementData.changes) elementData.changes = [];
            elementData.changes.push(`scaled to ${Math.round(currentScale * 100)}%`);
        }

        function generateChangeSummary() {
            if (selectedElement === null || !elementsData[selectedElement]) {
                outputText.textContent = 'Select an element to generate a change summary.';
                return;
            }
            
            const elementData = elementsData[selectedElement];
            const notes = elementNotes.value.trim();
            const type = noteType.value;
            
            const summary = [];
            
            summary.push(`Element: ${elementData.tag}${elementData.className ? ` (class: ${elementData.className})` : ''}`);
            
            if (currentX !== elementData.originalPosition.x || currentY !== elementData.originalPosition.y) {
                const deltaX = Math.round(currentX - elementData.originalPosition.x);
                const deltaY = Math.round(currentY - elementData.originalPosition.y);
                summary.push(`Moved ${Math.abs(deltaX)}px ${deltaX >= 0 ? 'right' : 'left'}, ${Math.abs(deltaY)}px ${deltaY >= 0 ? 'down' : 'up'}`);
            }
            
            if (Math.abs(currentScale - 1) > 0.01) {
                summary.push(`Scaled to ${Math.round(currentScale * 100)}% of original size`);
            }
            
            if (type !== 'other') {
                summary.push(`Change type: ${type}`);
            }
            
            if (notes) {
                summary.push(`Note: ${notes}`);
            }
            
            if (summary.length === 1) {
                summary.push('No changes detected');
            }
            
            let output = '## Changes to Apply\n\n';
            summary.forEach(item => {
                output += `- ${item}\n`;
            });
            
            outputText.textContent = output;
        }

        loadBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) {
                browserAddress.value = url;
                previewFrame.src = url;
                
                previewFrame.onload = () => {
                    extractElements();
                };
            }
        });

        browserAddress.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const url = browserAddress.value.trim();
                if (url) {
                    previewFrame.src = url;
                    previewFrame.onload = () => {
                        extractElements();
                    };
                }
            }
        });

        document.getElementById('moveLeftBtn').addEventListener('click', () => moveElement('left', 10));
        document.getElementById('moveRightBtn').addEventListener('click', () => moveElement('right', 10));
        document.getElementById('moveUpBtn').addEventListener('click', () => moveElement('up', 10));
        document.getElementById('moveDownBtn').addEventListener('click', () => moveElement('down', 10));
        document.getElementById('scaleUpBtn').addEventListener('click', () => scaleElement(true, 0.1));
        document.getElementById('scaleDownBtn').addEventListener('click', () => scaleElement(false, 0.1));
        generateBtn.addEventListener('click', generateChangeSummary);
        
        elementNotes.addEventListener('input', () => {
            if (selectedElement !== null && elementsData[selectedElement]) {
                elementsData[selectedElement].notes = elementNotes.value;
            }
        });

        noteType.addEventListener('change', () => {
            if (selectedElement !== null && elementsData[selectedElement]) {
                elementsData[selectedElement].noteType = noteType.value;
            }
        });

        window.addEventListener('click', (e) => {
            if (e.target.tagName !== 'HTML' && e.target.tagName !== 'BODY') return;
            
            if (selectedElement !== null) {
                const prevItem = elementList.children[selectedElement];
                if (prevItem) prevItem.classList.remove('selected');
                
                removeDragListeners();
                
                if (selectedBox) {
                    selectedBox.remove();
                    selectedBox = null;
                }
                
                selectedElement = null;
                propertiesPanel.style.display = 'none';
            }
        });

        loadSamplePage();
    </script>
</body>
</html>
